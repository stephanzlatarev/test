# This is a skill for playing a game of Tic-Tac-Toe
name: Play Tic-Tac-Toe

observe:

  marks:

    # The game board has 9 cells - 3 rows, 3 columns.
    limit: 9

    # Observe the marks on the game board with their row, column, and player
    attributes:
      - name: row
        options: [1, 2, 3]

      - name: col
        options: [1, 2, 3]

      - name: player
        options: ["X", "O"]

act:

  marks:

    # The brain does not modify existing marks
    modify: false

    # The brain creates one new mark
    create: 1

    # The move consists of placement and player
    attributes:
      - name: row
      - name: col
      - name: player

playbooks:
  open: playbook-open.js
  fork: playbook-fork.js
  defend: playbook-defend.js
  force: playbook-force.js
  block: playbook-block.js
  win: playbook-win.js

display:
  marks:
    shape: square
    attributes:
      - name: row
        type: y-axis
      - name: col
        type: x-axis
      - name: player
        type: icon
