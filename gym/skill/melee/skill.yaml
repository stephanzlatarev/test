# This is a skill for fighting in StarCraft 2
name: StarCraft 2 melee

observe:

  enemies:
    limit: 10
    attributes:

      - name: type
        options: ["Zealot", "Stalker", "Sentry", "Immortal", "Colossus"]
      - name: health
        range: [0, 500]
      - name: radius
        range: [0, 5]
      - name: range
        range: [0, 5]

      - name: pos
        type: space
        axes: [x, y]
        range: [0, 300]

  warriors:
    limit: 10
    attributes:

      - name: type
        options: ["Zealot", "Stalker", "Sentry", "Immortal", "Colossus"]
      - name: health
        range: [0, 500]
      - name: radius
        range: [0, 5]
      - name: range
        range: [0, 5]

      - name: pos
        type: space
        axes: [x, y]
        range: [0, 300]

      - name: action
        options: ["None", "Move", "Attack"]
      - name: target
        type: space
        axes: [x, y]
        range: [0, 300]

act:

  warriors:
    attributes:
      - name: action
      - name: target

playbooks:
  priority-attack: playbook-priority-attack.js
  focus-fire: playbook-focus-fire.js
  kite-back: playbook-kite-back.js

display:
  enemies:
    shape: circle
    x: pos.x
    y: pos.y
    color: red
    icon: https://robobays.github.io/images/unit/${type}.webp
    trims:
      - shape: circle
        border: red
        radius: range
  warriors:
    shape: circle
    x: pos.x
    y: pos.y
    radius: radius
    color: green
    icon: https://robobays.github.io/images/unit/${type}.webp
    trims:
      - shape: arrow
        headx: target.x
        heady: target.y
      - shape: circle
        border: green
        radius: range
